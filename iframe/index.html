<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>去耦喵</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/iframe/styles.css" />
	</head>
	<body>
		<main class="app-shell">
			<header class="topbar">
				<div id="componentBadge" class="component-summary">正在读取芯片…</div>
				<div class="header-actions">
					<button id="adjustPinsButton" class="quiet-button" type="button">调整引脚</button>
					<details id="historyPanel" class="history-panel" hidden>
						<summary>生成记录</summary>
						<div id="historyList" class="history-list"></div>
					</details>
				</div>
			</header>

			<div class="notice-stack">
				<div id="errorBanner" class="notice error-banner" hidden></div>
				<div id="successBanner" class="notice success-banner" hidden></div>
			</div>

			<section class="domains-panel">
				<div class="section-heading">
					<h1>电源域</h1>
				</div>
				<div class="domain-columns" aria-hidden="true"><span>电源域</span><span>引脚</span><span>主电容</span><span>引脚去耦</span><span></span></div>
				<datalist id="labelPresets">
					<option value="+1V0"></option><option value="+1V1"></option><option value="+1V2"></option>
					<option value="+1V8"></option><option value="+2V5"></option><option value="+3V3"></option>
					<option value="+5V"></option><option value="VDD"></option><option value="VCC"></option>
					<option value="VDDA"></option><option value="AVDD"></option><option value="DVDD"></option>
					<option value="VCORE"></option><option value="VBAT"></option><option value="VREF"></option>
				</datalist>
				<div id="domainsList" class="domains-list"></div>
			</section>

			<aside id="pinsDrawer" class="pins-drawer" hidden>
				<div class="drawer-heading">
					<div><strong>调整电源引脚</strong><span>已选 <b id="selectedPinCount">0</b> 个，勾选并分配电源域</span></div>
					<div class="drawer-actions"><button id="addDomainButton" class="quiet-button" type="button">＋ 电源域</button><button id="closePinsButton" class="icon-button" type="button" aria-label="关闭">×</button></div>
				</div>
				<div class="pins-toolbar">
					<input id="pinSearch" type="search" placeholder="搜索引脚或网络" />
					<button id="onlyCandidatesButton" class="filter-button active" type="button">仅候选</button>
				</div>
				<div id="pinsList" class="pins-list"></div>
			</aside>

			<footer class="action-dock">
				<div class="device-pickers">
					<div class="device-config">
						<button class="device-picker" data-open-native-device="bulk" type="button">
							<span>主容器件</span><strong data-selected-device="bulk">选择器件</strong><b>›</b>
						</button>
						<input class="global-cap-value" data-global-cap-value="bulk" aria-label="全局主电容容量" type="text" value="4.7uF" spellcheck="false" />
					</div>
					<div class="device-config">
						<button class="device-picker" data-open-native-device="pin" type="button">
							<span>去耦器件</span><strong data-selected-device="pin">选择器件</strong><b>›</b>
						</button>
						<input class="global-cap-value" data-global-cap-value="pin" aria-label="全局去耦电容容量" type="text" value="100nF" spellcheck="false" />
					</div>
				</div>
				<div id="placementSummary" class="placement-summary">正在计算…</div>
				<button id="placeAllButton" class="primary-button" type="button">放置</button>
			</footer>
		</main>

		<script src="/dist/iframe.js"></script>
	</body>
</html>
